<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card Designer</title>
    <link rel="icon" href="assets/card-maker-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body class="home-page">
    <main class="home-shell">
      <header class="home-header">
        <div class="home-brand">
          <img src="assets/card-maker-logo.svg" alt="" />
          <h1>Card Designer</h1>
        </div>
        <div class="home-header-actions">
          <a class="home-button" href="./" title="Go to the Home Page" aria-label="Go to the Home Page">
            <span class="home-icon" aria-hidden="true"></span>
          </a>
          <div id="signedInPanel" class="home-account-summary hidden">
            <button id="accountMenuButton" class="home-menu-button" type="button" aria-label="Account menu" aria-expanded="false">
              <img src="assets/menu-icon.svg" alt="" aria-hidden="true" />
            </button>
            <div id="accountMenu" class="home-account-menu hidden">
              <p id="currentUserLabel" class="home-account-menu-status"></p>
              <button id="signOutButton" class="button subtle" type="button">Log Out</button>
              <button id="chooseImageProviderButton" class="button subtle" type="button">Choose New Image Provider</button>
            </div>
          </div>
        </div>
      </header>

      <p id="homeFeatureMessage" class="home-feature-message">Log in to see app features</p>

      <section id="signInPanel" class="home-sign-in" aria-label="Account">
        <fieldset>
          <label>
            <span>Email</span>
            <input id="emailInput" type="email" autocomplete="username" />
          </label>
          <label>
            <span>Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" />
          </label>
          <div class="action-grid">
            <button id="signUpButton" class="button subtle" type="button">Sign Up</button>
            <button id="signInButton" class="button primary" type="button">Sign In</button>
          </div>
          <label>
            <span>Confirmation code</span>
            <input id="confirmationInput" type="text" inputmode="numeric" />
          </label>
          <button id="confirmButton" class="button subtle" type="button">Confirm Account</button>
          <p id="authStatus" class="status-line"></p>
        </fieldset>
      </section>

      <nav class="home-destinations hidden" aria-label="Card Designer destinations">
        <a class="home-destination" href="sets/">
          <span class="home-destination-icon my-sets-icon" aria-hidden="true"></span>
          <span>My Sets</span>
        </a>
        <a class="home-destination" href="designer/?new=card">
          <span class="home-destination-icon new-card-icon" aria-hidden="true"></span>
          <span>New Card</span>
        </a>
      </nav>

      <button id="myFriendsButton" class="my-friends-link hidden" type="button">My Friends</button>
    </main>

    <dialog id="imageProviderDialog" class="modal-dialog" aria-labelledby="imageProviderDialogTitle">
      <form id="imageProviderForm" class="modal-card">
        <button id="closeImageProviderXButton" class="modal-close-button" type="button" aria-label="Close image provider dialog">x</button>
        <h2 id="imageProviderDialogTitle">Choose New Image Provider</h2>
        <label>
          <span>Image provider</span>
          <select id="imageProviderInput">
            <option value="aws">AWS Bedrock</option>
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="stability">Stability AI</option>
            <option value="ace">ace.ai-compatible</option>
            <option value="firefly">Adobe Firefly-compatible</option>
            <option value="claude">Claude-compatible</option>
            <option value="fal">Fal.ai-compatible</option>
            <option value="leonardo">Leonardo.ai-compatible</option>
            <option value="midjourney">Midjourney-compatible</option>
            <option value="morphic">Morphic-compatible</option>
            <option value="runware">Runware-compatible</option>
          </select>
        </label>
        <label id="providerApiKeyLabel">
          <span>Provider API key</span>
          <input id="providerApiKeyInput" type="password" autocomplete="off" />
        </label>
        <label id="providerEndpointLabel">
          <span>Provider endpoint URL</span>
          <input id="providerEndpointInput" type="url" inputmode="url" />
        </label>
        <label id="providerModelLabel">
          <span>Model or deployment</span>
          <input id="providerModelInput" type="text" autocomplete="off" />
        </label>
        <p id="imageGenerationStatus" class="status-line"></p>
        <div class="modal-actions two-up">
          <button id="saveImageGenerationSettingsButton" class="button primary" type="submit">Save AI Settings</button>
          <button id="closeImageProviderButton" class="button subtle" type="button">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="incomingShareDialog" class="modal-dialog" aria-labelledby="incomingShareTitle">
      <form id="incomingShareForm" class="modal-card">
        <h2 id="incomingShareTitle">Shared set copy</h2>
        <p id="incomingShareMessage">A user sent you a set.</p>
        <div id="incomingShareCodeChoice" class="share-conflict-choice hidden">
          <p id="incomingShareCodeChoiceText" class="status-line"></p>
          <label>
            <span>Duplicate set code</span>
            <select id="incomingShareCodeResolution">
              <option value="" selected disabled>Choose an option</option>
              <option value="overwrite">Overwrite the existing set</option>
              <option value="new">Create a new set code</option>
            </select>
          </label>
        </div>
        <div id="incomingShareNameChoice" class="share-conflict-choice hidden">
          <p id="incomingShareNameChoiceText" class="status-line"></p>
          <label>
            <span>Duplicate set name</span>
            <select id="incomingShareNameResolution">
              <option value="" selected disabled>Choose an option</option>
              <option value="keep">Keep this set name</option>
              <option value="new">Create a new set name</option>
            </select>
          </label>
        </div>
        <div class="modal-actions two-up">
          <button id="acceptIncomingShareButton" class="button primary" type="button">Accept copy</button>
          <button id="rejectIncomingShareButton" class="button subtle" type="button">Reject copy</button>
        </div>
      </form>
    </dialog>

    <div id="toastRegion" class="toast-region home-toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="set-sharing.js"></script>
    <script src="app.js"></script>
  </body>
</html>
