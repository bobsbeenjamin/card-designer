AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Secure card designer backend with API Gateway, Lambda, Cognito, and DynamoDB.

Parameters:
  AppEnvironment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment that controls the allowed web origin.

Mappings:
  WebOrigins:
    dev:
      Origin: http://localhost:3000
    prod:
      Origin: https://bobsbeenjamin.github.io

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref CardDesignsTable
        CARD_HISTORY_TABLE_NAME: !Ref CardHistoryTable
        SETS_TABLE_NAME: !Ref CardSetsTable
        USER_SETTINGS_TABLE_NAME: !Ref UserSettingsTable
        USER_SETTINGS_KEY_ID: !Ref UserSettingsKey
        USER_BUCKET_PREFIX: !Sub "cd-${AWS::AccountId}-${AWS::Region}-${AppEnvironment}"
        ART_BUCKET_NAME: !Ref CardArtBucket

Resources:
  CardDesignsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "card-designer-${AppEnvironment}-card-designs"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: cardId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: cardId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  CardHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "card-designer-${AppEnvironment}-card-history"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: cardKey
          AttributeType: S
        - AttributeName: versionId
          AttributeType: S
      KeySchema:
        - AttributeName: cardKey
          KeyType: HASH
        - AttributeName: versionId
          KeyType: RANGE

  CardSetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "card-designer-${AppEnvironment}-card-sets"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: code
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  UserSettingsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS key for card designer ${AppEnvironment} user settings"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  UserSettingsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/card-designer-${AppEnvironment}-user-settings"
      TargetKeyId: !Ref UserSettingsKey

  UserSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "card-designer-${AppEnvironment}-user-settings"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: settingKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: settingKey
          KeyType: RANGE

  CardArtBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "card-designer-${AWS::AccountId}-${AWS::Region}-${AppEnvironment}-art"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CardDesignerUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "card-designer-${AppEnvironment}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      LambdaConfig:
        PostConfirmation: !GetAtt CardDesignerPostConfirmationFunction.Arn
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CardDesignerUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CardDesignerUserPool
      ClientName: !Sub "card-designer-${AppEnvironment}-web"
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH


  CardDesignerPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "card-designer-${AppEnvironment}-post-confirmation"
      CodeUri: src/
      Handler: post_confirmation.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CardSetsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:CreateBucket
                - s3:ListBucket
                - s3:PutEncryptionConfiguration
                - s3:PutBucketPublicAccessBlock
              Resource: !Sub "arn:${AWS::Partition}:s3:::cd-${AWS::AccountId}-${AWS::Region}-${AppEnvironment}-*"

  CardDesignerPostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CardDesignerPostConfirmationFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CardDesignerUserPool.Arn

  CardDesignerApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "card-designer-${AppEnvironment}-api"
      CorsConfiguration:
        AllowOrigins:
          - !FindInMap [WebOrigins, !Ref AppEnvironment, Origin]
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        DefaultAuthorizer: CardDesignerJwtAuthorizer
        Authorizers:
          CardDesignerJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CardDesignerUserPool}"
              audience:
                - !Ref CardDesignerUserPoolClient
            IdentitySource: "$request.header.Authorization"

  CardDesignerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "card-designer-${AppEnvironment}-cards"
      CodeUri: src/
      Handler: cards.handler
      Timeout: 60
      Environment:
        Variables:
          USER_POOL_ID: !Ref CardDesignerUserPool
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CardDesignsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CardSetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserSettingsTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt CardDesignsTable.Arn
                - !GetAtt CardHistoryTable.Arn
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt UserSettingsKey.Arn
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource: !GetAtt CardDesignerUserPool.Arn
            - Effect: Allow
              Action:
                - s3:CreateBucket
                - s3:ListBucket
                - s3:PutEncryptionConfiguration
                - s3:PutBucketPublicAccessBlock
                - s3:PutBucketPolicy
                - s3:DeleteBucketPolicy
              Resource: !Sub "arn:${AWS::Partition}:s3:::cd-${AWS::AccountId}-${AWS::Region}-${AppEnvironment}-*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::cd-${AWS::AccountId}-${AWS::Region}-${AppEnvironment}-*/*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt CardArtBucket.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "${CardArtBucket.Arn}/*"
      Events:
        GetArt:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /art
            Method: GET
        SaveArt:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /art
            Method: POST
        GetFrame:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /frame
            Method: GET
        SaveFrame:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /frame
            Method: POST
        GenerateArt:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /art/generate
            Method: POST
        GetOpenAiKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /settings/openai-key
            Method: GET
        SaveOpenAiKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /settings/openai-key
            Method: PUT
        GetImageGenerationSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /settings/image-generation
            Method: GET
        SaveImageGenerationSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /settings/image-generation
            Method: PUT
        GetPublicSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /public/sets
            Method: GET
            Auth:
              Authorizer: NONE
        ListSets:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets
            Method: GET
        ListSetShares:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /set-shares
            Method: GET
        ListSetShareResponses:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /set-share-responses
            Method: GET
        CreateSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets
            Method: POST
        RenameSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets/{setCode}
            Method: PUT
        DeleteSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets/{setCode}
            Method: DELETE
        MakeSetPublic:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets/{setCode}/public
            Method: PUT
        ShareSet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets/{setCode}/share
            Method: POST
        AcceptSetShare:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /set-shares/{shareId}/accept
            Method: POST
        RejectSetShare:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /set-shares/{shareId}
            Method: DELETE
        ReorderSetCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /sets/{setCode}/cards/reorder
            Method: POST
        ListCards:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards
            Method: GET
        CreateCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards
            Method: POST
        GetCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards/{cardId}
            Method: GET
        GetCardHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards/{cardId}/history
            Method: GET
        UpdateCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards/{cardId}
            Method: PUT
        UpdateCardImage:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards/{cardId}/image
            Method: PUT
        DeleteCard:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /cards/{cardId}
            Method: DELETE
        ProxyImage:
          Type: HttpApi
          Properties:
            ApiId: !Ref CardDesignerApi
            Path: /image-proxy
            Method: GET

Outputs:
  ApiUrl:
    Description: HTTP API endpoint for the card designer frontend.
    Value: !Sub "https://${CardDesignerApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito user pool id for frontend authentication.
    Value: !Ref CardDesignerUserPool
  UserPoolClientId:
    Description: Public Cognito app client id for the browser app.
    Value: !Ref CardDesignerUserPoolClient
  TableName:
    Description: DynamoDB card designs table name.
    Value: !Ref CardDesignsTable
  CardHistoryTableName:
    Description: DynamoDB card history table name.
    Value: !Ref CardHistoryTable
  SetsTableName:
    Description: DynamoDB card sets table name.
    Value: !Ref CardSetsTable
  UserSettingsTableName:
    Description: DynamoDB user settings table name.
    Value: !Ref UserSettingsTable
  UserSettingsKeyId:
    Description: KMS key id for user settings encryption.
    Value: !Ref UserSettingsKey
