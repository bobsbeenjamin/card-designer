<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Sets</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../config.js"></script>
  </head>
  <body class="sets-page">
    <main class="sets-shell">
      <header class="sets-page-header">
        <div>
          <p class="eyebrow">Card Designer</p>
          <div class="sets-title-row">
            <h1 id="setsTitle">My Sets</h1>
            <button
              id="setDetailRenameButton"
              class="set-rename-button hidden"
              type="button"
              title="Rename this set"
              aria-label="Rename this set"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"></path>
              </svg>
            </button>
          </div>
          <p id="setsStatus" class="status-line">Sign in to view your sets.</p>
        </div>
        <div class="sets-header-actions">
          <button id="setsBackButton" class="button subtle hidden" type="button">My Sets</button>
          <button
            id="setDetailExportButton"
            class="set-export-button hidden"
            type="button"
            title="Export this set"
            aria-label="Export this set"
          >
            <svg aria-hidden="true" focusable="false" viewBox="0 0 100 100">
              <path d="M14 20H52V32H26V74H74V58H86V86H14Z"></path>
              <path d="M45 58C50 40 62 29 76 26V13L96 34L76 55V42C65 43 55 48 45 58Z"></path>
            </svg>
          </button>
          <a class="button subtle" href="../">Close</a>
        </div>
      </header>

      <section id="signInPanel" class="sets-sign-in">
        <fieldset>
          <legend>Account</legend>
          <label>
            <span>Email</span>
            <input id="emailInput" type="email" autocomplete="username" />
          </label>
          <label>
            <span>Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" />
          </label>
          <button id="signInButton" class="button primary" type="button">Sign In</button>
          <p id="authStatus" class="status-line">Signed out</p>
        </fieldset>
      </section>

      <section id="setsPageContent" class="sets-content hidden" aria-label="My sets">
        <div id="setLibraryContent" class="library-modal-content"></div>
      </section>
    </main>

    <dialog id="exportSetDialog" class="modal-dialog export-set-dialog" aria-labelledby="exportSetTitle">
      <form id="exportSetForm" class="modal-card export-set-card">
        <button id="closeExportSetXButton" class="modal-close-button" type="button" aria-label="Close export dialog">x</button>
        <h2 id="exportSetTitle">Export set</h2>
        <label>
          <span>Format</span>
          <select id="exportFormatInput">
            <option value="tabletop-simulator">Tabletop Simulator</option>
            <option value="share-edit-copy">Send this set to another user for editing</option>
          </select>
        </label>
        <label id="shareRecipientEmailLabel" class="hidden">
          <span>User email</span>
          <input id="shareRecipientEmailInput" type="email" autocomplete="off" />
        </label>
        <p id="exportSetStatus" class="status-line"></p>
        <div class="modal-actions two-up">
          <button id="confirmExportSetButton" class="button primary" type="button">Export</button>
          <button id="closeExportSetButton" class="button subtle" type="button">Close</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteSetDialog" class="modal-dialog" aria-labelledby="deleteSetTitle">
      <form method="dialog" class="modal-card">
        <h2 id="deleteSetTitle">Are you sure you want to delete this set?</h2>
        <p id="deleteSetMessage">This action cannot be undone</p>
        <div class="modal-actions delete-set-actions">
          <button id="confirmDeleteSetButton" class="button danger no-wrap" value="delete" type="submit">Yes, delete forever</button>
          <button class="button subtle no-wrap" value="cancel" type="submit">Cancel (back to safety)</button>
        </div>
      </form>
    </dialog>

    <dialog id="renameSetDialog" class="modal-dialog" aria-labelledby="renameSetTitle">
      <form id="renameSetForm" class="modal-card">
        <h2 id="renameSetTitle">Change this set's name</h2>
        <label>
          <span>New name</span>
          <input id="renameSetNameInput" type="text" required />
        </label>
        <p id="renameSetStatus" class="status-line"></p>
        <div class="modal-actions two-up">
          <button id="confirmRenameSetButton" class="button primary" type="submit">Change</button>
          <button id="cancelRenameSetButton" class="button subtle" type="button">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="incomingShareDialog" class="modal-dialog" aria-labelledby="incomingShareTitle">
      <form id="incomingShareForm" class="modal-card">
        <h2 id="incomingShareTitle">Shared set copy</h2>
        <p id="incomingShareMessage">A user sent you a set.</p>
        <div class="modal-actions two-up">
          <button id="acceptIncomingShareButton" class="button primary" type="button">Yes</button>
          <button id="rejectIncomingShareButton" class="button subtle" type="button">No</button>
        </div>
      </form>
    </dialog>

    <script src="sets.js"></script>
  </body>
</html>
