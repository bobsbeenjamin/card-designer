<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom Set</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../config.js"></script>
  </head>
  <body class="public-page">
    <main class="public-shell">
      <header class="public-header">
        <h1 id="pageTitle">Custom Set</h1>
        <p id="setMeta" class="public-status">Loading set...</p>
      </header>
      <section id="cardGrid" class="card-library-grid" aria-label="Cards in this set"></section>
      <p id="publicStatus" class="public-status"></p>
    </main>

    <dialog id="cardZoomDialog" class="card-zoom-dialog" aria-label="Card image preview">
      <button id="cardZoomClose" class="card-zoom-close" type="button" aria-label="Close preview">x</button>
      <div id="cardZoomContent" class="card-zoom-content"></div>
    </dialog>

    <script src="./public.js"></script>
  </body>
</html>
