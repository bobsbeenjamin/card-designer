<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Custom Set</title>
    <link rel="icon" href="../assets/card-maker-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../config.js"></script>
  </head>
  <body class="public-page">
    <main class="public-shell">
      <header class="public-header">
        <div>
          <h1 id="pageTitle">Custom Set</h1>
          <p id="setMeta" class="public-status">Loading set...</p>
        </div>
        <a class="home-button" href="../" title="Go to the Home Page" aria-label="Go to the Home Page">
          <span class="home-icon" aria-hidden="true"></span>
        </a>
      </header>
      <section id="cardGrid" class="card-library-grid" aria-label="Cards in this set"></section>
      <p id="publicStatus" class="public-status"></p>
    </main>

    <dialog id="cardZoomDialog" class="card-zoom-dialog" aria-label="Card image preview">
      <button id="cardZoomClose" class="card-zoom-close" type="button" aria-label="Close preview">x</button>
      <div class="card-zoom-viewer">
        <button id="previousZoomCardButton" class="card-navigation-button" type="button" title="Previous card" aria-label="Previous card">
          <span aria-hidden="true">&#8592;</span>
        </button>
        <div id="cardZoomContent" class="card-zoom-content"></div>
        <button id="nextZoomCardButton" class="card-navigation-button" type="button" title="Next card" aria-label="Next card">
          <span aria-hidden="true">&#8594;</span>
        </button>
      </div>
    </dialog>

    <script src="./public.js"></script>
  </body>
</html>
